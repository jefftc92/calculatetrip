kind = "web"
previewPath = "/"
title = "CalculateTrip"
version = "1.0.0"
id = "artifacts/calculatetrip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24605

[services.development]
run = "pnpm --filter @workspace/calculatetrip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculatetrip", "run", "build" ]
publicDir = "artifacts/calculatetrip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24605"
BASE_PATH = "/"
