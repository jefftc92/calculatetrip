name: Sync src/ changes → Vite app

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Detect changed src/ files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/' | grep -v '^src/app/sitemap\|^src/app/robots\|^src/lib/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Port changes to Vite app
        if: steps.changed.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node .github/scripts/port-to-vite.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sync-vite-${{ github.sha }}
          title: "auto: port ${{ github.sha }} → Vite app"
          body: |
            This PR was created automatically by the sync-vite workflow.

            It ports changes merged to `src/` into the equivalent Vite files under `artifacts/calculatetrip/src/`.

            **Please review the diff carefully before merging** — the AI porter is accurate but not infallible.

            Triggered by: ${{ github.sha }}
          commit-message: "auto: port src/ changes to Vite app"
          delete-branch: true
